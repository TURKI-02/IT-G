<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة الموظفين - نظام إدارة الدعم الفني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <!-- Include CSS from previous files -->
    <style>
        /* CSS Variables (similar to previous files) */
        :root {
            --primary-blue: #007bff;
            --light-gray: #f8f9fa;
            --dark-gray: #333;
            --text-color: #555;
            --border-color: #dee2e6;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --border-radius: 8px;
            --font-family: 'Cairo', sans-serif;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
        }

        /* General Styling */
        body { font-family: var(--font-family); background-color: var(--light-gray); direction: rtl; text-align: right; margin: 0; color: var(--dark-gray); }
        .dashboard-layout { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
        .sidebar { background-color: #fff; padding: 20px; border-left: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .sidebar h3 {color: var(--primary-blue); text-align: center; margin-bottom: 30px;}
        .sidebar ul {list-style: none; padding: 0;}
        .sidebar li {margin-bottom: 10px;}
        .sidebar a {display: block; padding: 12px 15px; text-decoration: none; color: var(--dark-gray); border-radius: var(--border-radius); transition: background-color 0.3s, color 0.3s;}
        .sidebar a:hover, .sidebar a.active {background-color: var(--primary-blue); color: #fff;}
        .main-content { padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; color: var(--dark-gray); }

        /* Table specific styling */
        .table-container { background-color: #fff; border-radius: var(--border-radius); box-shadow: var(--shadow); overflow: hidden; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 15px 20px; border-bottom: 1px solid var(--border-color); text-align: right; }
        .data-table th { background-color: var(--light-gray); font-weight: 600; color: var(--dark-gray); }

        /* Status badges */
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
        }
        .status-badge.online { background-color: var(--success-color); }
        .status-badge.offline { background-color: var(--danger-color); }
        .status-badge.finished { background-color: var(--warning-color); }

        /* Logout button style */
        .logout-btn {
            background-color: var(--danger-color);
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: var(--border-radius);
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
        }
        .logout-btn:hover { background-color: #c82333; }

        /* Responsive design for smaller screens */
        @media (max-width: 768px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .sidebar { border-bottom: 1px solid var(--border-color); border-left: none; }
        }
    </style>
</head>
<body>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <h3>نظام الدعم الفني</h3>
            <nav>
                <ul>
                    <!-- القائمة الجانبية المعدلة (في سياق لوحة الإدارة) -->
                    <li><a href="admin_dashboard.html">إدارة المستخدمين</a></li>
                    <li><a href="staff_monitoring.html" class="active">متابعة الموظفين</a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <header class="header">
                <h1>متابعة حالة الموظفين</h1>
                <a href="#" class="logout-btn" onclick="handleLogout()">تسجيل الخروج</a>
            </header>

            <section class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>الحالة</th>
                            <th>وقت الدخول</th>
                            <th>وقت الخروج</th>
                            <th>ساعات العمل</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>فارس</td>
                            <td id="status-fars"></td>
                            <td id="login-time-fars"></td>
                            <td id="logout-time-fars"></td>
                            <td id="work-hours-fars"></td>
                        </tr>
                        <tr>
                            <td>تركي</td>
                            <td id="status-turki"></td>
                            <td id="login-time-turki"></td>
                            <td id="logout-time-turki"></td>
                            <td id="work-hours-turki"></td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script>
        // --- Logout Logic ---
        function handleLogout() {
            // Clear current user session data
            localStorage.removeItem('currentUser');
            // Redirect to login page
            window.location.href = 'index.html';
        }

        // --- Staff Monitoring Logic ---
        function formatTime(timestamp) {
            if (!timestamp) return '--';
            const date = new Date(timestamp);
            const hours = date.getHours();
            const minutes = date.getMinutes();
            const period = hours >= 12 ? 'مساءً' : 'صباحاً';
            const formattedHours = hours % 12 || 12; // Convert to 12-hour format
            const formattedMinutes = minutes < 10 ? '0' + minutes : minutes;
            return `${formattedHours}:${formattedMinutes} ${period}`;
        }

        function calculateDuration(loginTimestamp, logoutTimestamp) {
            const durationMs = logoutTimestamp - loginTimestamp;
            const hours = Math.floor(durationMs / (1000 * 60 * 60));
            const minutes = Math.floor((durationMs % (1000 * 60 * 60)) / (1000 * 60));
            return `${hours} ساعة و ${minutes} دقيقة`;
        }

        function updateStaffStatusDisplay(username) {
            const loginTimeElement = document.getElementById(`login-time-${username.toLowerCase()}`);
            const logoutTimeElement = document.getElementById(`logout-time-${username.toLowerCase()}`);
            const statusElement = document.getElementById(`status-${username.toLowerCase()}`);
            const durationElement = document.getElementById(`work-hours-${username.toLowerCase()}`);

            const loginTime = parseInt(localStorage.getItem(`${username}_login_time`));
            const logoutTime = parseInt(localStorage.getItem(`${username}_logout_time`));

            loginTimeElement.textContent = formatTime(loginTime);

            if (logoutTime) {
                // User has logged out
                logoutTimeElement.textContent = formatTime(logoutTime);
                statusElement.innerHTML = `<span class="status-badge finished">أنهى العمل</span>`;
                durationElement.textContent = calculateDuration(loginTime, logoutTime);
            } else if (loginTime) {
                // User is currently logged in
                logoutTimeElement.textContent = '--';
                statusElement.innerHTML = `<span class="status-badge online">يعمل</span>`;
                durationElement.textContent = calculateDuration(loginTime, new Date().getTime());
            } else {
                // User has not logged in today or data cleared
                logoutTimeElement.textContent = '--';
                statusElement.innerHTML = `<span class="status-badge offline">غير متصل</span>`;
                durationElement.textContent = '0 ساعات';
            }
        }

        // Update display on load and set an interval for live calculation (for current working staff)
        document.addEventListener('DOMContentLoaded', () => {
            updateStaffStatusDisplay('Fars');
            updateStaffStatusDisplay('Turki');
            // Update every minute for live status updates if a user is still logged in
            setInterval(() => {
                updateStaffStatusDisplay('Fars');
                updateStaffStatusDisplay('Turki');
            }, 60000);
        });
    </script>

</body>
</html>
